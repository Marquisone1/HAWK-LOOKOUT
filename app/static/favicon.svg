<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#1E1E1E"/>
  
  <!-- Hawk head profile -->
  <g fill="#5BA3B2">
    <!-- Head -->
    <circle cx="32" cy="24" r="14"/>
    
    <!-- Beak -->
    <polygon points="46,24 54,22 46,26"/>
    
    <!-- Eye -->
    <circle cx="36" cy="22" r="3" fill="#1E1E1E"/>
    
    <!-- Wing -->
    <path d="M 20 28 Q 15 32 18 42 Q 22 40 24 36" stroke="#5BA3B2" stroke-width="2" fill="none"/>
    
    <!-- Tail feathers -->
    <path d="M 28 38 Q 20 42 22 52" stroke="#5BA3B2" stroke-width="2" fill="none"/>
    <path d="M 32 38 Q 28 45 30 54" stroke="#5BA3B2" stroke-width="2" fill="none"/>
    <path d="M 36 38 Q 36 46 38 54" stroke="#5BA3B2" stroke-width="2" fill="none"/>
  </g>
</svg>
