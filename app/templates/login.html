<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <title>HAWK LOOKOUT — Login</title>
  <style>
    :root {
      --bg: #1E1E1E;
      --panel: #2A2A2A;
      --line: #3D3D3D;
      --text: #E8E8E8;
      --muted: #A0A0A0;
      --accent: #5BA3B2;
      --ok: #6DB87E;
      --warn: #D4A574;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #0F0F0F 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      line-height: 1.5;
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 44px 40px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .brand-icon {
      font-size: 2rem;
      line-height: 1;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    .subtitle {
      margin: 4px 0 32px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #F5EFE8;
      color: var(--text);
      padding: 13px 16px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.12);
    }

    .btn-submit {
      width: 100%;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #FFF8F0;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-submit:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .alert-error {
      background: #3D2530;
      border: 1px solid #4D2E34;
      color: #E8A8B2;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <span class="brand-icon">🦅</span>
      <h1>HAWK LOOKOUT</h1>
    </div>
    <p class="subtitle">Sign in to access the WHOIS recon tool.</p>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-submit">Sign In →</button>
    </form>
  </div>
</body>
</html>
