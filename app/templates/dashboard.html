<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <title>HAWK LOOKOUT — Dashboard</title>
  <style>
    :root {
      --bg: #1E1E1E;
      --panel: #2A2A2A;
      --line: #3D3D3D;
      --text: #E8E8E8;
      --muted: #A0A0A0;
      --accent: #5BA3B2;
      --ok: #6DB87E;
      --warn: #D4A574;
      --danger: #B8707A;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #0F0F0F 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      line-height: 1.5;
    }

    .app {
      width: 100%;
      max-width: 1200px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px 40px 40px;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .nav-brand h1 { margin: 0; font-size: 1.8rem; letter-spacing: 0.08em; color: var(--accent); }
    .nav-brand .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 0.9rem; }

    .nav-links { display: flex; align-items: center; gap: 12px; }

    .nav-btn {
      text-decoration: none; color: var(--text); border: 1px solid var(--line);
      border-radius: 10px; padding: 8px 18px; font-size: 0.9rem; font-weight: 600;
      transition: border-color 0.15s, color 0.15s;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .nav-btn.logout { color: #A05060; border-color: #E8D4D8; }
    .nav-btn.logout:hover { border-color: #A05060; }

    /* Stats grid */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      padding: 20px; text-align: center;
    }
    .stat-value { font-size: 2.2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-top: 4px; }

    /* Charts */
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-panel {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 20px;
    }
    .chart-title {
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin: 0 0 16px;
    }
    canvas { width: 100% !important; height: 220px !important; }

    /* Top targets table */
    .table-panel {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 20px; margin-bottom: 28px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.08em; }

    /* Feed status */
    .feed-panel {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 20px;
    }
    .feed-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.88rem; }
    .feed-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .feed-dot.ok { background: var(--ok); }
    .feed-dot.warn { background: var(--warn); }
    .feed-dot.err { background: var(--danger); }

    .loading-msg { text-align: center; color: var(--muted); padding: 40px 0; font-size: 0.9rem; }

    /* Bar chart fallback (pure CSS) */
    .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 180px; padding-top: 10px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
    .bar {
      width: 100%; min-width: 6px; max-width: 28px; background: var(--accent);
      border-radius: 4px 4px 0 0; transition: height 0.4s ease; position: relative;
    }
    .bar:hover { opacity: 0.85; }
    .bar-label {
      font-size: 0.58rem; color: var(--muted); margin-top: 4px;
      white-space: nowrap; transform: rotate(-45deg); transform-origin: top left;
    }
    .bar-val {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      font-size: 0.65rem; color: var(--accent); white-space: nowrap;
    }

    /* Donut (pure CSS) */
    .donut-wrap { display: flex; align-items: center; justify-content: center; gap: 28px; }
    .donut {
      width: 140px; height: 140px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .donut-inner {
      width: 80px; height: 80px; border-radius: 50%; background: var(--panel);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 700; color: var(--text);
    }
    .donut-legend { font-size: 0.82rem; }
    .donut-legend div { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    @media (max-width: 800px) {
      .charts { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <nav class="top-nav">
      <div class="nav-brand">
        <h1>📊 Dashboard</h1>
        <p class="subtitle">Lookup analytics &amp; threat feed status</p>
      </div>
      <div class="nav-links">
        <a href="/" class="nav-btn">🦅 Lookups</a>
        {% if session.get('site_role') == 'admin' %}
        <a href="/admin" class="nav-btn">👥 Users</a>
        {% endif %}
        <a href="/settings" class="nav-btn">⚙ Settings</a>
        <a href="/logout" class="nav-btn logout">Logout</a>
      </div>
    </nav>

    <div id="content">
      <div class="loading-msg">🦅 Loading analytics…</div>
    </div>
  </main>

  <script>
    const CSRF = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

    function esc(v) {
      if (v === null || v === undefined) return "-";
      return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    async function loadDashboard() {
      const [analyticsResp, feedResp] = await Promise.all([
        fetch('/web/analytics', { headers: { 'X-CSRFToken': CSRF } }),
        fetch('/web/feed-status', { headers: { 'X-CSRFToken': CSRF } }),
      ]);

      const analytics = await analyticsResp.json();
      const feed = await feedResp.json();

      const el = document.getElementById('content');

      // Stats cards
      let html = `
        <div class="stats">
          <div class="stat-card">
            <div class="stat-value">${esc(analytics.total)}</div>
            <div class="stat-label">Total Lookups</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${esc(analytics.last_7d)}</div>
            <div class="stat-label">Last 7 Days</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${esc(analytics.last_30d)}</div>
            <div class="stat-label">Last 30 Days</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${analytics.type_breakdown.ip + analytics.type_breakdown.domain > 0 ? Math.round(analytics.type_breakdown.domain / (analytics.type_breakdown.ip + analytics.type_breakdown.domain) * 100) : 0}%</div>
            <div class="stat-label">Domain Lookups</div>
          </div>
        </div>
      `;

      // Charts row
      html += `<div class="charts">`;

      // Bar chart — lookups per day (last 30d)
      html += `<div class="chart-panel">
        <div class="chart-title">Lookups Per Day (Last 30 Days)</div>`;
      if (analytics.by_day.length) {
        const maxCount = Math.max(...analytics.by_day.map(d => d.count), 1);
        html += `<div class="bar-chart">`;
        for (const d of analytics.by_day) {
          const pct = Math.max((d.count / maxCount) * 100, 2);
          const label = d.date.slice(5); // MM-DD
          html += `<div class="bar-col">
            <div class="bar" style="height:${pct}%"><span class="bar-val">${d.count}</span></div>
            <span class="bar-label">${esc(label)}</span>
          </div>`;
        }
        html += `</div>`;
      } else {
        html += `<p style="color:var(--muted);text-align:center;padding:40px 0;">No data yet — start scanning!</p>`;
      }
      html += `</div>`;

      // Donut — IP vs Domain
      const ipC = analytics.type_breakdown.ip;
      const domC = analytics.type_breakdown.domain;
      const total = ipC + domC;
      const domPct = total ? Math.round((domC / total) * 100) : 0;
      const ipPct = 100 - domPct;
      html += `<div class="chart-panel">
        <div class="chart-title">IP vs Domain Breakdown</div>
        <div class="donut-wrap">
          <div class="donut" style="background: conic-gradient(var(--accent) 0% ${domPct}%, #A05060 ${domPct}% 100%);">
            <div class="donut-inner">${esc(total)}</div>
          </div>
          <div class="donut-legend">
            <div><span class="legend-dot" style="background:var(--accent);"></span> Domains: ${esc(domC)}</div>
            <div><span class="legend-dot" style="background:#A05060;"></span> IPs: ${esc(ipC)}</div>
          </div>
        </div>
      </div>`;

      html += `</div>`; // close charts

      // Top targets table
      html += `<div class="table-panel">
        <div class="chart-title">Top 10 Targets</div>`;
      if (analytics.top_targets.length) {
        html += `<table><thead><tr><th>#</th><th>Target</th><th>Lookups</th></tr></thead><tbody>`;
        analytics.top_targets.forEach((t, i) => {
          html += `<tr><td>${i + 1}</td><td>${esc(t.target)}</td><td>${esc(t.count)}</td></tr>`;
        });
        html += `</tbody></table>`;
      } else {
        html += `<p style="color:var(--muted);text-align:center;padding:20px 0;">No lookups recorded yet.</p>`;
      }
      html += `</div>`;

      // Threat feed status
      const cf = feed.clickfix || {};
      const uh = feed.urlhaus || {};
      const dotClass = cf.last_error ? 'err' : (cf.stale ? 'warn' : 'ok');
      const statusLabel = cf.last_error ? 'Error' : (cf.stale ? 'Stale' : 'Healthy');
      const uhDot = uh.configured ? 'ok' : 'warn';
      const uhStatus = uh.configured ? 'Configured' : 'Not Configured';
      html += `<div class="feed-panel">
        <div class="chart-title">Threat Feed Status</div>
        <div class="feed-row"><span><span class="feed-dot ${dotClass}"></span>ClickFix Feed</span><span>${esc(statusLabel)}</span></div>
        <div class="feed-row"><span style="color:var(--muted)">Cached Entries</span><span>${esc(cf.entries || 0)}</span></div>
        <div class="feed-row"><span style="color:var(--muted)">Last Refresh</span><span>${cf.last_refresh ? new Date(cf.last_refresh + 'Z').toLocaleString() : 'Never'}</span></div>
        <div class="feed-row"><span style="color:var(--muted)">Cache Age</span><span>${cf.age_seconds != null ? Math.round(cf.age_seconds) + 's' : '—'}</span></div>
        ${cf.last_error ? `<div class="feed-row"><span style="color:var(--danger)">Last Error</span><span style="color:var(--danger);font-size:0.82rem;">${esc(cf.last_error)}</span></div>` : ''}
        <div style="border-top:1px solid var(--line);margin:10px 0;"></div>
        <div class="feed-row"><span><span class="feed-dot ${uhDot}"></span>URLhaus (abuse.ch)</span><span>${esc(uhStatus)}</span></div>
        <div class="feed-row"><span style="color:var(--muted)">Mode</span><span>Live host query per scan</span></div>
        ${!uh.configured ? `<div class="feed-row"><span style="color:var(--warn);font-size:0.82rem;">Add your Auth-Key in Settings → URLhaus Auth-Key</span></div>` : ''}
      </div>`;

      el.innerHTML = html;
    }

    loadDashboard().catch(err => {
      document.getElementById('content').innerHTML =
        `<div class="loading-msg" style="color:#A05060;">Failed to load analytics: ${esc(err.message)}</div>`;
    });
  </script>
</body>
</html>
