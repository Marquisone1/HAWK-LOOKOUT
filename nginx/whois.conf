# /etc/nginx/sites-available/hawk-lookout
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/hawk-lookout /etc/nginx/sites-enabled/
#
# Assumes you have already obtained a TLS certificate (e.g. via Certbot).
# Replace your-domain.com with your actual domain.

server {
    listen 80;
    server_name your-domain.com;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ── TLS (update these paths after running certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (Nginx handles these; Flask-Talisman is a fallback)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request size limit — keep small for this API ─────────────────────────
    client_max_body_size 1m;

    # ── Proxy to Gunicorn ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Forward exactly one hop of X-Forwarded-For so Flask's ProxyFix
        # correctly resolves the real client IP for rate limiting
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
