services:
  whois:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    image: hawk-lookout:latest
    container_name: hawk-lookout
    restart: unless-stopped

    # Bind to localhost only — Nginx proxies public traffic to this port.
    # WHOIS_HOST_PORT lets you pick a custom host port (default: 3000).
    ports:
      - "127.0.0.1:${WHOIS_HOST_PORT:-3000}:3000"

    # SQLite database persisted on the host so data survives container rebuilds
    volumes:
      - ./data:/data

    # Secrets from .env — copy .env.example to .env and fill in WHOISFREAK_API_KEY.
    # SECRET_KEY is auto-generated to /data/secret_key if omitted.
    # Admin credentials are written to /data/first_boot_credentials.txt on first boot.
    env_file:
      - path: .env
        required: false

    environment:
      # Disable Flask-level HTTPS enforcement — Nginx handles TLS termination and
      # HSTS. Keeping this as 'development' here prevents Talisman from force-
      # redirecting the internal HTTP connection between Nginx and Gunicorn.
      - FLASK_ENV=development

    # Limit blast radius if the container is compromised
    read_only: false      # SQLite needs write access to /data
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
